# The TQC <-> Atlas dictionary, transcribed row-by-row from
# docs/conceptual-model/00-source.md. This is the single source of truth that the BDD
# features and V&V witnesses are checked against by the honesty meta-gate.
#
# Fields:
#   id      kebab-case row identifier (matches a feature tag @row:<id>)
#   tqc     the TQC primitive
#   atlas   the Atlas / uor-addr realization (summary)
#   source  the F1 / uor-addr / holospaces anchor
#   status  some-true | build | open   (see model/status.toml)
#   stage   S0..S4
#   oracle  an id from model/oracles.toml
#   tier    suite  = implemented, gating, green
#           target = defined behavior, not yet built, expected-RED, non-gating
#   feature path (relative to repo root) of the Gherkin definition

