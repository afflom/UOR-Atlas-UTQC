# The UTQC <-> Atlas dictionary. The sourced (some-true) rows are transcribed from
# docs/conceptual-model/00-source.md; the build rows are constructions defined here and
# validated in-repo against the universal MTC axioms or exact certificates; open rows are
# measured only. This is the single source of truth that the BDD features and V&V
# witnesses are checked against by the honesty meta-gate.
#
# Fields:
#   id      kebab-case row identifier (matches a feature tag @row:<id>)
#   tqc     the UTQC primitive
#   atlas   the Atlas / uor-addr realization (summary)
#   source  the F1 / uor-addr / holospaces anchor
#   status  some-true | build | open   (see model/status.toml)
#   stage   S0..S4
#   oracle  an id from model/oracles.toml
#   tier    suite  = implemented, gating, green
#           target = defined behavior, not yet built, expected-RED, non-gating
#   feature path (relative to repo root) of the Gherkin definition

