# The status ledger: the controlled vocabulary for the TQC.
# A status is a CONTRACT on what the V&V suite may assert about a row.
# Parsed by `tqc-model`; enforced by the honesty meta-gate in `tqc-conformance`.
#
# The vocabulary is `some-true` / `build` / `open`. The TQC inner product is the
# positive-definite Euclidean composition norm; unitarity is genuine orthogonality.

[[level]]
id = "some-true"
summary = "Established: an F1 theorem, a realized uor-addr operation, or a holospaces vv witness — always an external anchor, never an in-repo derivation."
may_assert = "green-gating"   # the implementation reproduces the sourced fact
gating = true

[[level]]
id = "build"
summary = "A precisely-scoped construction on sourced pieces, validated against the universal MTC axioms or an exact in-repo certificate."
may_assert = "axioms-only"    # validated against universal axioms / sourced reductions only
gating = true

[[level]]
id = "open"
summary = "A genuine unknown. Measured and reported, never asserted true."
may_assert = "measurement-only"
gating = false
